name: Lighthouse CI (Preview)

on:
  pull_request:
    paths:
      - 'src/app/**/*.tsx'

permissions:
  contents: read
  pull-requests: write
  deployments: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] && [ -n "${{ secrets.VERCEL_TEAM_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Lighthouse (missing Vercel secrets)
        if: steps.check_secrets.outputs.ready != 'true'
        run: |
          echo "Skipping Lighthouse audit because one or more required Vercel secrets are missing."

      # Buffer for Vercel deployment (Approx 30s)
      - name: Wait for Vercel Deployment
        if: steps.check_secrets.outputs.ready == 'true'
        run: sleep 40

      # 1. Get Vercel Preview URL
      - name: Vercel Preview URL
        if: steps.check_secrets.outputs.ready == 'true'
        id: vercel_preview
        uses: zentered/vercel-preview-url@v1.4.0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}

      # 2. Extract Paths from PR Table
      - name: Extract Paths
        if: steps.check_secrets.outputs.ready == 'true'
        id: extract_url
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const baseUrl = "${{ steps.vercel_preview.outputs.url }}".replace(/\/$/, "");
            
            if (!baseUrl || baseUrl === "" || baseUrl === "undefined") {
              core.setFailed("Vercel URL not found. Ensure deployment is successful.");
              return;
            }

            const regex = /\|\s*URL path\s*\|\s*([^|]+)\s*\|/i;
            const match = body.match(regex);
            
            let urlList = [];
            if (match && match[1]) {
              const rawValue = match[1].replace(/`/g, '').trim();
              if (rawValue && rawValue.toLowerCase() !== 'n/a') {
                const paths = rawValue.split(/[\s,，]+/).filter(p => p.trim() !== "");
                paths.forEach(path => {
                  const formattedPath = path.startsWith('/') ? path : `/${path}`;
                  urlList.push(`${baseUrl}${formattedPath}`);
                });
              }
            }
            
            if (urlList.length === 0) {
              core.setOutput('has_urls', 'false');
            } else {
              core.setOutput('urls', urlList.join('\n'));
              core.setOutput('has_urls', 'true');
            }

      # 3. Run Lighthouse CI with Failure Threshold
      - name: Run Lighthouse CI
        if: steps.check_secrets.outputs.ready == 'true' && steps.extract_url.outputs.has_urls == 'true'
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.extract_url.outputs.urls }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Fails the build if Performance is < 70
          budgetPath: |
            [
              {
                "resourceSizes": [],
                "resourceCounts": [],
                "timings": [],
                "performance": 70
              }
            ]

      # 4. Post Results Summary
      - name: Post score comment
        if: always() && steps.check_secrets.outputs.ready == 'true' && steps.lhci.outputs.manifest != ''
        uses: actions/github-script@v7
        env:
          LHCI_MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const manifest = JSON.parse(process.env.LHCI_MANIFEST);
            const links = JSON.parse(process.env.LHCI_LINKS || '{}');
            const emoji = s => s >= 0.9 ? '🟢' : s >= 0.7 ? '🟡' : '🔴';
            
            let tableHeader = [
              '## 🔦 Lighthouse CI Report',
              '',
              '| Page Path | Performance | Access. | SEO | Report |',
              '|:---        |:---:       |:---:    |:---: |:---:  |'
            ];

            const tableRows = manifest.map(({ url, summary }) => {
              const path = new URL(url).pathname;
              const reportUrl = links[url] || '#';
              const format = (val) => `${Math.round(val * 100)} ${emoji(val)}`;
              
              return `| \`${path}\` | ${format(summary.performance)} | ${format(summary.accessibility)} | ${format(summary.seo)} | [View](${reportUrl}) |`;
            });

            const body = [
              ...tableHeader, 
              ...tableRows, 
              '', 
              '**Threshold:** Performance must be ≥ 70 🟡',
              '🟢 ≥90 · 🟡 70–89 · 🔴 <70'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
