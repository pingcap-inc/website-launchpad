name: Lighthouse CI (Preview)

on:
  pull_request:
    paths:
      - 'src/app/**/*.tsx'

permissions:
  contents: read
  pull-requests: write
  deployments: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buffer for Vercel deployment (Approx 30s)
      - name: Wait for Vercel Deployment
        run: sleep 40

      # 1. Get Vercel Preview URL
      - name: Vercel Preview URL
        id: vercel_preview_url
        uses: zentered/vercel-preview-url@v1.4.0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}

      # 2. Extract Paths from PR Table
      - name: Extract Paths
        id: extract_url
        uses: actions/github-script@v7
        env:
          VERCEL_PREVIEW_URL: ${{ steps.vercel_preview_url.outputs.preview_url }}
          VERCEL_PREVIEW_URL_ALT: ${{ steps.vercel_preview_url.outputs.url }}
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const rawBaseUrl = (process.env.VERCEL_PREVIEW_URL || process.env.VERCEL_PREVIEW_URL_ALT || "").trim();
            const extractedUrl = (rawBaseUrl.match(/https?:\/\/[^\s)]+/)?.[0] || "").replace(/\/$/, "");
            const extractedHost = rawBaseUrl.replace(/^\s*https?:\/\//, '').split(/[\s)]+/)[0].replace(/\/$/, "");
            const baseUrl = extractedUrl || (extractedHost ? `https://${extractedHost}` : "");
            
            if (!baseUrl || baseUrl === "" || baseUrl === "undefined") {
              core.setFailed(`Vercel URL not found. raw output: "${rawBaseUrl || "empty"}"`);
              return;
            }

            const regex = /\|\s*URL path\s*\|\s*([^|]+)\s*\|/i;
            const match = body.match(regex);
            
            let urlList = [];
            if (match && match[1]) {
              const rawValue = match[1].replace(/`/g, '').trim();
              if (rawValue && rawValue.toLowerCase() !== 'n/a') {
                const paths = rawValue.split(/[\s,，]+/).filter(p => p.trim() !== "");
                paths.forEach(path => {
                  const value = path.trim();
                  if (!value) return;
                  const formattedPath = value.startsWith('/') ? value : `/${value}`;
                  urlList.push(`${baseUrl}${formattedPath}`);
                });
              }
            }
            
            if (urlList.length === 0) {
              core.setOutput('has_urls', 'false');
            } else {
              core.setOutput('urls', urlList.join('\n'));
              core.setOutput('has_urls', 'true');
            }

      # 3. Run Lighthouse CI with Failure Threshold
      - name: Run Lighthouse CI
        if: steps.extract_url.outputs.has_urls == 'true'
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          urls: ${{ steps.extract_url.outputs.urls }}
          configPath: ./.github/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Fails the build if Performance is < 70
          budgetPath: |
            [
              {
                "resourceSizes": [],
                "resourceCounts": [],
                "timings": [],
                "performance": 70
              }
            ]

      # 4. Post Results Summary
      - name: Post score comment
        if: always() && steps.lhci.outputs.manifest != ''
        uses: actions/github-script@v7
        env:
          LHCI_MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const manifest = JSON.parse(process.env.LHCI_MANIFEST);
            const links = JSON.parse(process.env.LHCI_LINKS || '{}');
            const emoji = s => s >= 0.9 ? '🟢' : s >= 0.7 ? '🟡' : '🔴';
            
            let tableHeader = [
              '## 🔦 Lighthouse CI Report',
              '',
              '| Page Path | Performance | Access. | SEO | Report |',
              '|:---        |:---:       |:---:    |:---: |:---:  |'
            ];

            const normalizeUrl = (value) => {
              try {
                const u = new URL(value);
                return `${u.origin}${u.pathname}`.replace(/\/$/, '');
              } catch {
                return String(value || '').replace(/\/$/, '');
              }
            };

            const getReportUrl = (entryUrl, entry) => {
              if (entry?.htmlReport) return entry.htmlReport;
              if (entry?.report) return entry.report;

              if (links[entryUrl]) return links[entryUrl];

              const normalizedEntryUrl = normalizeUrl(entryUrl);
              const directMatchKey = Object.keys(links).find(
                (key) => normalizeUrl(key) === normalizedEntryUrl
              );
              if (directMatchKey) return links[directMatchKey];

              const entryPath = (() => {
                try {
                  return new URL(entryUrl).pathname.replace(/\/$/, '') || '/';
                } catch {
                  return '';
                }
              })();

              const pathMatchKey = Object.keys(links).find((key) => {
                try {
                  return (new URL(key).pathname.replace(/\/$/, '') || '/') === entryPath;
                } catch {
                  return false;
                }
              });
              if (pathMatchKey) return links[pathMatchKey];

              return '#';
            };

            const tableRows = manifest.map((entry) => {
              const { url, summary } = entry;
              const pageUrl = url;
              const pagePath = (() => {
                try {
                  return new URL(pageUrl).pathname || '/';
                } catch {
                  return pageUrl;
                }
              })();
              const reportUrl = getReportUrl(pageUrl, entry);
              const format = (val) => `${Math.round(val * 100)} ${emoji(val)}`;
              
              return `| [\`${pagePath}\`](${pageUrl}) | ${format(summary.performance)} | ${format(summary.accessibility)} | ${format(summary.seo)} | [Lighthouse Report](${reportUrl}) |`;
            });

            const body = [
              ...tableHeader, 
              ...tableRows, 
              '', 
              '**Threshold:** Performance must be ≥ 70 🟡',
              '🟢 ≥90 · 🟡 70–89 · 🔴 <70'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
